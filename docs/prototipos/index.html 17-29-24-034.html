<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock da Plataforma — Projetos, Tarefas, Membros e Configurações</title>
  <style>
    :root {
      --color-primary: #8B0836;
      --color-primary-strong: #6f062b;
      --color-background: #f7f4ea;
      --color-surface: #FCF9E8;
      --color-card: #ffffff;
      --color-border: #ece5d6;
      --color-text: #030303;
      --color-text-soft: #6e6a63;
      --color-success: #2e9b63;
      --color-warning: #d39a1f;
      --color-info: #4d7ae6;
      --color-danger: #d35d5d;
      --sidebar-width: 256px;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --shadow-soft: 0 14px 40px rgba(22, 24, 35, 0.06);
      --font-main: Outfit, Inter, Arial, sans-serif;
      --spacing-1: 8px;
      --spacing-2: 12px;
      --spacing-3: 16px;
      --spacing-4: 20px;
      --spacing-5: 24px;
      --spacing-6: 32px;
      --spacing-7: 40px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-main);
      background: var(--color-background);
      color: var(--color-text);
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
    }

    .sidebar {
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 26px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo {
      width: 185px;
      height: 66px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary);
      font-weight: 700;
      font-size: 28px;
      background: rgba(139, 8, 54, 0.06);
      flex-shrink: 0;
    }

    .sidebar-section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-soft);
      margin-bottom: 10px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-item {
      min-height: 56px;
      width: 100%;
      border-radius: 16px;
      border: none;
      background: transparent;
      color: #030303;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 400;
      cursor: pointer;
      text-align: left;
    }

    .nav-item.active {
      background: var(--color-primary);
      color: var(--color-surface);
      font-weight: 600;
    }

    .nav-icon {
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-projects {
      display: grid;
      gap: 10px;
    }

    .project-chip {
      min-height: 44px;
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--color-border);
      background: #fff;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .project-chip.active {
      border-color: rgba(139, 8, 54, 0.28);
      background: rgba(139, 8, 54, 0.06);
      color: var(--color-primary);
      font-weight: 600;
    }

    .project-chip-role {
      font-size: 11px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(139, 8, 54, 0.1);
      color: var(--color-primary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid var(--color-border);
      padding-top: 18px;
      display: grid;
      gap: 10px;
    }

    .profile-mini {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--color-border);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(139, 8, 54, 0.18), rgba(139, 8, 54, 0.06));
      color: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    .profile-mini strong {
      display: block;
      font-size: 14px;
    }

    .profile-mini span {
      display: block;
      color: var(--color-text-soft);
      font-size: 12px;
      margin-top: 4px;
    }

    .main {
      padding: 28px;
      display: grid;
      gap: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .page-title h1 {
      font-size: 36px;
      line-height: 1.08;
      margin-bottom: 10px;
    }

    .page-title p {
      color: var(--color-text-soft);
      max-width: 820px;
      line-height: 1.5;
      font-size: 15px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button,
    .button-outline,
    .button-subtle,
    .icon-button {
      min-height: 48px;
      border-radius: 14px;
      border: none;
      padding: 0 18px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .button {
      background: var(--color-primary);
      color: var(--color-surface);
      font-weight: 700;
    }

    .button:hover {
      background: var(--color-primary-strong);
    }

    .button-outline {
      border: 1px solid var(--color-border);
      background: #fff;
      color: var(--color-text);
      font-weight: 600;
    }

    .button-subtle {
      background: rgba(139, 8, 54, 0.08);
      color: var(--color-primary);
      font-weight: 700;
    }

    .icon-button {
      width: 48px;
      padding: 0;
      background: #fff;
      border: 1px solid var(--color-border);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr auto;
      gap: 16px;
    }

    .surface-input,
    .surface-card,
    .view,
    .panel,
    .stat,
    .table-wrap,
    .column,
    .member-card,
    .settings-card,
    .project-card,
    .empty-state,
    .activity-card,
    .detail-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }

    .surface-input {
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      color: var(--color-text-soft);
    }

    .surface-input strong {
      color: var(--color-text);
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .stat {
      padding: 18px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--color-text-soft);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-helper {
      font-size: 13px;
      color: var(--color-text-soft);
    }

    .view {
      padding: 22px;
      display: none;
    }

    .view.active {
      display: block;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .panel {
      padding: 20px;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel-header h2 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .panel-header p {
      color: var(--color-text-soft);
      font-size: 14px;
      line-height: 1.45;
    }

    .panel-stack {
      display: grid;
      gap: 16px;
    }

    .activity-card,
    .detail-card,
    .project-card,
    .member-card,
    .settings-card {
      padding: 18px;
    }

    .activity-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: start;
      gap: 14px;
    }

    .activity-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(139, 8, 54, 0.08);
      color: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .activity-card h3,
    .detail-card h3,
    .project-card h3,
    .member-card h3,
    .settings-card h3 {
      font-size: 17px;
      margin-bottom: 6px;
    }

    .muted {
      color: var(--color-text-soft);
      font-size: 14px;
      line-height: 1.5;
    }

    .small-muted {
      color: var(--color-text-soft);
      font-size: 12px;
      line-height: 1.45;
    }

    .badge-row,
    .meta-row,
    .settings-row,
    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .badge {
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
    }

    .badge.primary { background: rgba(139, 8, 54, 0.08); color: var(--color-primary); }
    .badge.success { background: rgba(46, 155, 99, 0.12); color: var(--color-success); }
    .badge.warning { background: rgba(211, 154, 31, 0.14); color: #9a6700; }
    .badge.info { background: rgba(77, 122, 230, 0.12); color: var(--color-info); }
    .badge.danger { background: rgba(211, 93, 93, 0.12); color: var(--color-danger); }

    .kanban {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .column {
      padding: 18px;
      min-height: 560px;
      background: var(--color-surface);
    }

    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .column-header h3 {
      font-size: 18px;
    }

    .task-list {
      display: grid;
      gap: 12px;
    }

    .task-card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .task-card h4 {
      font-size: 16px;
      line-height: 1.35;
    }

    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--color-text-soft);
      font-size: 12px;
    }

    .member-list {
      display: grid;
      gap: 14px;
    }

    .member-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .member-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 8px;
      color: var(--color-text-soft);
      font-size: 13px;
    }

    .table-wrap {
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #fff;
    }

    thead th {
      text-align: left;
      color: var(--color-text-soft);
      font-weight: 700;
      padding: 16px 18px;
      border-bottom: 1px solid var(--color-border);
      background: rgba(139, 8, 54, 0.03);
    }

    tbody td {
      padding: 16px 18px;
      border-bottom: 1px solid var(--color-border);
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .project-card {
      display: grid;
      gap: 14px;
    }

    .project-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .project-visual {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(139, 8, 54, 0.08);
      color: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
    }

    .settings-list {
      display: grid;
      gap: 14px;
    }

    .settings-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
      display: grid;
      gap: 10px;
      place-items: center;
    }

    .empty-state-icon {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      background: rgba(139, 8, 54, 0.08);
      color: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    .divider {
      height: 1px;
      background: var(--color-border);
      margin: 12px 0;
    }

    @media (max-width: 1320px) {
      .stats-grid,
      .project-grid,
      .grid-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .kanban {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 1080px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
      }

      .grid-2,
      .toolbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .main {
        padding: 18px;
      }

      .stats-grid,
      .project-grid,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .member-card,
      .activity-card,
      .settings-card {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

    function setView(view) {
      currentView = view;

      document.querySelectorAll('.nav-item').forEach(button => {
        button.classList.toggle('active', button.dataset.view === view);
      });

      document.querySelectorAll('.view').forEach(section => {
        section.classList.toggle('active', section.id === view);
      });

      const meta = viewMeta[view];
      document.getElementById('mainTitle').textContent = meta.title;
      document.getElementById('mainDescription').textContent = meta.description;
      document.getElementById('contextActionButton').textContent = meta.actionLabel;

      const projectSettingsNav = document.querySelector('[data-view="project-settings"]');
      projectSettingsNav.classList.toggle('hidden', !isAdmin());

      if (view === 'project-settings' && !isAdmin()) {
        currentView = 'dashboard';
        setView('dashboard');
        return;

    });

    document.getElementById('roleToggle').addEventListener('click', () => {
      currentRoleOverride = getCurrentRole() === 'admin' ? 'member' : 'admin';
      renderAll();
    });

    document.getElementById('projectShortcut').addEventListener('click', () => {
      setView('projects');
    });

    document.getElementById('contextActionButton').addEventListener('click', () => {
      const labels = {
        dashboard: 'Ação de mapeamento: criar uma nova tarefa a partir do dashboard.',
        projects: 'Ação de mapeamento: abrir fluxo de criação de projeto.',
        tasks: 'Ação de mapeamento: abrir modal de nova tarefa.',
        members: isAdmin() ? 'Ação de mapeamento: abrir modal de adicionar membro ao projeto.' : 'Membros comuns não adicionam pessoas ao projeto.',
        'project-settings': isAdmin() ? 'Ação de mapeamento: salvar alterações das configurações do projeto.' : 'Sem acesso às configurações do projeto.',
        profile: 'Ação de mapeamento: salvar alterações do perfil do usuário.'
      };
      alert(labels[currentView]);
    });

    renderAll();
  </script>
</body>
</html>
